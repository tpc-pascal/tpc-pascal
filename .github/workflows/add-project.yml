name: Add Projects to Profile

on:
  workflow_dispatch:
    inputs:
      repos:
        description: 'Repository names, comma-separated (e.g. subpas, libracal)'
        required: true
        type: string

jobs:
  add-projects:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          repository: tpc-pascal/tpc-pascal
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Add projects to README
        env:
          REPOS: ${{ github.event.inputs.repos }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/add_project.py

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "add projects to profile"
          git push
